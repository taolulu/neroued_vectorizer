name: Build wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ── Build wheels on each platform ─────────────────────────────────────────
  build-wheels:
    name: Wheels (${{ matrix.id }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
            cibw_build: "cp310-* cp311-* cp312-* cp313-* cp314-*"
            id: linux-x86_64
          - os: macos-14
            arch: arm64
            cibw_build: "cp310-* cp311-* cp312-* cp313-* cp314-*"
            id: macos-arm64
          # Split Windows into parallel groups to reduce wall time
          - os: windows-latest
            arch: AMD64
            cibw_build: "cp310-* cp311-*"
            id: windows-py310-311
          - os: windows-latest
            arch: AMD64
            cibw_build: "cp312-* cp313-*"
            id: windows-py312-313
          - os: windows-latest
            arch: AMD64
            cibw_build: "cp314-*"
            id: windows-py314

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Get version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: echo "SETUPTOOLS_SCM_PRETEND_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Cache vcpkg packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-win-${{ hashFiles('ci/install-deps-windows.bat', 'ci/potrace-CMakeLists.txt') }}
          restore-keys: vcpkg-win-

      - uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BUILD: ${{ matrix.cibw_build }}
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ env.SETUPTOOLS_SCM_PRETEND_VERSION }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.id }}
          path: wheelhouse/*.whl
          retention-days: 14

  # ── Build source distribution ─────────────────────────────────────────────
  build-sdist:
    name: Source distribution
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Get version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: echo "SETUPTOOLS_SCM_PRETEND_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: pipx run build --sdist
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ env.SETUPTOOLS_SCM_PRETEND_VERSION }}

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 14

  # ── Publish to TestPyPI (pre-release tags) ────────────────────────────────
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-24.04
    if: >-
      github.event_name == 'push'
      && startsWith(github.ref, 'refs/tags/v')
      && (contains(github.ref_name, 'rc') || contains(github.ref_name, 'a') || contains(github.ref_name, 'b'))
    environment:
      name: testpypi
      url: https://test.pypi.org/p/neroued-vectorizer
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # ── Publish to PyPI (stable tags) ─────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-24.04
    if: >-
      github.event_name == 'push'
      && startsWith(github.ref, 'refs/tags/v')
      && !contains(github.ref_name, 'rc')
      && !contains(github.ref_name, 'a')
      && !contains(github.ref_name, 'b')
    environment:
      name: pypi
      url: https://pypi.org/p/neroued-vectorizer
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
